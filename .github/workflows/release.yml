        separate-directories: true
        delete-merged: true
  release:
    if: always()
    continue-on-error: false
    runs-on: ubuntu-latest
    needs:
    - merge_artifacts
    steps:
    - name: checkout (action)
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Download vars.sh
      uses: actions/download-artifact@v4
      with:
        name: vars.sh
        path: ./
    - name: Show vars.sh
      run: cat vars.sh
    - name: Source vars.sh
      run: source vars.sh
    - name: Env (common)
      run: |
        source vars.sh
        echo "SRC_TAG=$SRC_TAG" >> $GITHUB_ENV
        echo "SRC_VERSION=$SRC_VERSION" >> $GITHUB_ENV
    - name: Env (from tag)
      if: contains(github.ref, 'tags/v')
      run: |
        source vars.sh
        echo "SRC_VERSION_BODY=$SRC_VERSION_BODY" >> $GITHUB_ENV
    - name: Variables (from commit, no tag)
      if: ${{ !contains(github.ref, 'tags/v') }}
      run: echo 'nothing to do'
    - name: Verify vars.sh
      run: env | grep SRC
    - name: Verify existing artifacts
      run: |
        ls -lFhp .
        ls -lFhp dist*/ || echo 'none found'
    - name: Gather artifacts - ./dist
      uses: actions/download-artifact@v4
      with:
        pattern: dist
    - name: Verify existing artifacts
      run: |
        ls -lFhp .
        ls -lFhp dist*/ || echo 'none found'
        ( \
          cd dist ; \
          for dist in dist-*/ ; do \
            ls -lFhpA $dist/ ; \
            mv -v $dist/* . ; \
            rmdir $dist ; \
          done ; \
        )
        ls -lFhp dist*/ || echo 'none found'
    - name: Publish python packages to test PyPI
      uses: pypa/gh-action-pypi-publish@v1.13.0
      with:
        repository-url: https://test.pypi.org/legacy/
        user: __token__
        password: ${{secrets.PYPI_TOKEN_TEST}}
        verbose: true
        skip-existing: true
    - name: Publish python packages to production PyPI
      if: ${{ contains(github.ref, 'tags/v') || inputs.official_release == 1 }}
      uses: pypa/gh-action-pypi-publish@v1.13.0
      with:
        user: __token__
        password: ${{secrets.PYPI_TOKEN}}
        verbose: true
